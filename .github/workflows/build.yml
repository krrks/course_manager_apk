name: 🔨 Auto Build & Release APK

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_build:
        description: '强制编译（忽略 zip 时间戳比对）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# FIX 1: Suppress Node.js 20 deprecation warning for actions/checkout@v4
# (GitHub will force Node.js 24 from June 2026 onwards)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ════════════════════════════════════════════════════════════════════════════
# Job 1 — 预检：决定是否需要编译
# ════════════════════════════════════════════════════════════════════════════
jobs:
  check:
    name: 🔍 Pre-flight checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_build: ${{ steps.decision.outputs.should_build }}
      zip_found:    ${{ steps.find_zip.outputs.zip_found }}
      zip_path:     ${{ steps.find_zip.outputs.zip_path }}
      zip_mtime:    ${{ steps.find_zip.outputs.zip_mtime }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. 检查本次提交是否只改动 .github/ ──────────────────────────────────
      - name: 🔍 Check if only .github files changed
        id: github_only
        if: github.event_name == 'push'
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          if [ -z "$CHANGED" ]; then
            echo "only_github=false" >> "$GITHUB_OUTPUT"
          else
            NON_GITHUB=$(echo "$CHANGED" | grep -v '^\.github/' || true)
            if [ -z "$NON_GITHUB" ]; then
              echo "ℹ️  Only .github/ files changed"
              echo "only_github=true" >> "$GITHUB_OUTPUT"
            else
              echo "only_github=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      # ── 3. 找 zip_update/ 里最新的 zip ──────────────────────────────────────
      - name: 📦 Find latest zip in zip_update/
        id: find_zip
        run: |
          ZIP_DIR="zip_update"
          LATEST_ZIP=""
          if [ -d "$ZIP_DIR" ]; then
            LATEST_ZIP=$(find "$ZIP_DIR" -maxdepth 1 -name "*.zip" \
                          -printf '%T@ %p\n' 2>/dev/null \
                         | sort -rn | head -n1 | awk '{print $2}')
          fi

          if [ -n "$LATEST_ZIP" ] && [ -f "$LATEST_ZIP" ]; then
            ZIP_MTIME=$(date -u -r "$LATEST_ZIP" '+%Y-%m-%dT%H:%M:%SZ')
            echo "✅ Latest zip: $LATEST_ZIP  (mtime: $ZIP_MTIME)"
            echo "zip_found=true"       >> "$GITHUB_OUTPUT"
            echo "zip_path=$LATEST_ZIP" >> "$GITHUB_OUTPUT"
            echo "zip_mtime=$ZIP_MTIME" >> "$GITHUB_OUTPUT"
          else
            echo "ℹ️  No zip found"
            echo "zip_found=false"      >> "$GITHUB_OUTPUT"
            echo "zip_path="            >> "$GITHUB_OUTPUT"
            echo "zip_mtime="           >> "$GITHUB_OUTPUT"
          fi

      # ── 4. 对比最新 Release，避免重复编译 ────────────────────────────────────
      - name: 🔎 Compare zip mtime with latest release
        id: compare_release
        if: steps.find_zip.outputs.zip_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZIP_MTIME: ${{ steps.find_zip.outputs.zip_mtime }}
          FORCE: ${{ github.event.inputs.force_build }}
        run: |
          if [ "$FORCE" = "true" ]; then
            echo "ℹ️  force_build=true — skipping mtime comparison"
            echo "already_released=false" >> "$GITHUB_OUTPUT"
          else
            RELEASE_BODY=$(gh release list --limit 1 --json body \
                            -q '.[0].body' 2>/dev/null || echo "")
            if echo "$RELEASE_BODY" | grep -qF "$ZIP_MTIME"; then
              echo "⏭️  zip mtime=$ZIP_MTIME already in latest release"
              echo "already_released=true" >> "$GITHUB_OUTPUT"
            else
              echo "✅ mtime not found in latest release — will build"
              echo "already_released=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      # ── 5. 汇总决策，输出统一的 should_build ────────────────────────────────
      - name: 📋 Final decision
        id: decision
        env:
          ONLY_GITHUB:      ${{ steps.github_only.outputs.only_github }}
          ALREADY_RELEASED: ${{ steps.compare_release.outputs.already_released }}
        run: |
          if [ "$ONLY_GITHUB" = "true" ]; then
            echo "⏭️  SKIP — only .github/ files changed"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          elif [ "$ALREADY_RELEASED" = "true" ]; then
            echo "⏭️  SKIP — zip already released"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "✅ GO — will build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

# ════════════════════════════════════════════════════════════════════════════
# Job 2 — 编译 & 发布（仅当 check.should_build == 'true' 时运行）
# ════════════════════════════════════════════════════════════════════════════
  build:
    name: 🔨 Build & Release APK
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. 解压 zip 并严格验证目标路径 ────────────────────────────────────────
      - name: 📂 Extract zip to repo root
        if: needs.check.outputs.zip_found == 'true'
        env:
          ZIP_PATH: ${{ needs.check.outputs.zip_path }}
        run: |
          echo "⬇️  Extracting: $ZIP_PATH"
          unzip -o "$ZIP_PATH" -d _zip_tmp

          INNER=$(find _zip_tmp -mindepth 1 -maxdepth 1 -type d | head -n1)
          SRC="${INNER:-_zip_tmp}"
          echo "📁 Source root: $SRC"

          echo "──────────── zip 内容 ────────────"
          find "$SRC" -type f | sort | sed "s|$SRC/||"
          echo "──────────────────────────────────"

          if find "$SRC" -type d -name '.github' | grep -q '.'; then
            echo "❌ FATAL: zip contains .github/ — aborting to protect workflow files"
            exit 1
          fi

          rsync -av --exclude='.github' "$SRC/" .
          rm -rf _zip_tmp
          echo "✅ Extracted to repo root (skipped .github/)"

      # ── 3. 生成文件目录清单并写入 zip_update/note.md ─────────────────────────
      - name: 📝 Generate file listing → zip_update/note.md
        if: needs.check.outputs.zip_found == 'true'
        env:
          ZIP_PATH: ${{ needs.check.outputs.zip_path }}
          ZIP_MTIME: ${{ needs.check.outputs.zip_mtime }}
        run: |
          mkdir -p zip_update
          NOTE="zip_update/note.md"

          unzip -o "$ZIP_PATH" -d _note_tmp 2>/dev/null
          INNER=$(find _note_tmp -mindepth 1 -maxdepth 1 -type d | head -n1)
          SRC="${INNER:-_note_tmp}"

          {
            echo "# 📦 Patch 文件清单"
            echo ""
            echo "| 字段 | 值 |"
            echo "|------|----|"
            echo "| ZIP 文件 | \`$(basename "$ZIP_PATH")\` |"
            echo "| 打包时间 (UTC) | \`$ZIP_MTIME\` |"
            echo "| 生成时间 (UTC) | \`$(date -u '+%Y-%m-%dT%H:%M:%SZ')\` |"
            echo "| 触发分支 | \`$GITHUB_REF_NAME\` |"
            echo "| 提交 SHA | \`$GITHUB_SHA\` |"
            echo ""
            echo "## 📁 本次 patch 包含的文件"
            echo ""
            echo '```'
            find "$SRC" -type f | sort | sed "s|$SRC/||"
            echo '```'
            echo ""
            echo "## 🗂 仓库源码目录（patch 后快照，排除 build/ 和 .gradle/）"
            echo ""
            echo '```'
            find . \
              -not -path './.git/*' \
              -not -path './.github/*' \
              -not -path './build/*' \
              -not -path './.gradle/*' \
              -not -path './_note_tmp/*' \
              -not -path './zip_update/*' \
              -type f | sort
            echo '```'
          } > "$NOTE"

          rm -rf _note_tmp
          echo "✅ note.md written to $NOTE"
          cat "$NOTE"

      # ── 4. 读取 release_note.md，删除 zip，提交变更 ───────────────────────────
      - name: 🧹 Clean up zip and commit changes
        if: needs.check.outputs.zip_found == 'true'
        run: |
          rm -f zip_update/*.zip
          echo "🗑️  Removed all *.zip from zip_update/"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "ℹ️  Nothing to commit"
          else
            RELEASE_NOTE_FILE="zip_update/release_note.md"
            if [ -f "$RELEASE_NOTE_FILE" ]; then
              RELEASE_NOTE_BODY=$(cat "$RELEASE_NOTE_FILE")
              COMMIT_MSG=$(printf '🧹 apply patch & clean zip_update [skip ci]\n\n%s' "$RELEASE_NOTE_BODY")
            else
              COMMIT_MSG="🧹 apply patch & clean zip_update [skip ci]"
            fi

            git commit -m "$COMMIT_MSG"
            git push origin HEAD
            echo "✅ Commit pushed"
          fi

      # ── 5. Set up JDK 17 ─────────────────────────────────────────────────
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 6. Gradle wrapper jar ───────────────────────────────────────────────
      - name: 📦 Ensure gradle-wrapper.jar exists
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "⬇️  Downloading gradle-wrapper.jar..."
            mkdir -p gradle/wrapper
            curl -fsSL \
              "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
          fi
          chmod +x ./gradlew

      # ── 7. Gradle 缓存 ────────────────────────────────────────────────────
      # FIX 3: Removed .gradle/configuration-cache from cache paths.
      # Using --configuration-cache caused "Calculating task graph as no
      # cached configuration is available" on every cache miss. Standard
      # --build-cache is sufficient and more reliable.
      - name: 💾 Restore Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper/dists
            ~/.gradle/caches/modules-*
            ~/.gradle/caches/jars-*
            ~/.gradle/caches/build-cache-*
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties','**/libs.versions.toml','**/*.kt') }}
          restore-keys: |
            gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties','**/libs.versions.toml') }}-
            gradle-${{ runner.os }}-

      # ── 8. 编译 Debug APK ───────────────────────────────────────────────────
      # FIX 3: Removed --configuration-cache flag (was printing
      # "Calculating task graph as no cached configuration is available"
      # on every cold run). --build-cache is kept for incremental builds.
      - name: 🔧 Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --build-cache \
            -Dorg.gradle.parallel=true
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:+UseParallelGC"

      # ── 9. 编译 Release APK ─────────────────────────────────────────────────
      - name: 🚀 Build Release APK
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --build-cache \
            -Dorg.gradle.parallel=true
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:+UseParallelGC"

      # ── 10. 计算下一个版本号（v1.001 → v1.002 …） ──────────────────────────
      - name: 🔢 Compute next version tag
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release list --limit 100 --json tagName \
                    -q '.[].tagName' 2>/dev/null \
                   | grep -E '^v1\.[0-9]+$' \
                   | sort -t. -k2 -n \
                   | tail -n1 || echo "")

          if [ -z "$LATEST" ]; then
            NEXT="v1.001"
          else
            SEQ=$(echo "$LATEST" | sed 's/v1\.//')
            NEXT_SEQ=$(printf "%03d" $((10#$SEQ + 1)))
            NEXT="v1.$NEXT_SEQ"
          fi

          echo "✅ Next version: $NEXT"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

      # ── 11. 发布 Release ─────────────────────────────────────────────────────
      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "智慧课务管理 ${{ steps.version.outputs.tag }}"
          body: |
            ## 📱 智慧课务管理系统 ${{ steps.version.outputs.tag }}

            ### 📦 构建来源
            ${{ needs.check.outputs.zip_found == 'true'
                && format('- 来源 zip：`{0}`\n- zip 文件修改时间（UTC）：`{1}`',
                           needs.check.outputs.zip_path,
                           needs.check.outputs.zip_mtime)
                || '- 来源：仓库当前代码（无 zip）' }}

            ### 安装说明
            1. 下载 `app-release.apk`（正式包）或 `app-debug.apk`（调试包）
            2. 在 Android 设备上开启「允许未知来源安装」
            3. 安装并运行
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build & Release APK

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build (ignore zip timestamp check)'
        required: false
        default: true
        type: boolean
      build_debug:
        description: 'Build Debug APK'
        required: false
        default: false
        type: boolean
      build_release:
        description: 'Build Release APK'
        required: false
        default: true
        type: boolean

# ════════════════════════════════════════════════════════════════════════════
# Job 1 — Pre-flight checks
# ════════════════════════════════════════════════════════════════════════════
jobs:
  check:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_build: ${{ steps.decision.outputs.should_build }}
      compile_apk:  ${{ steps.decision.outputs.compile_apk }}
      patch_found:  ${{ steps.find_patch.outputs.patch_found }}
      patch_path:   ${{ steps.find_patch.outputs.patch_path }}
      patch_mtime:  ${{ steps.find_patch.outputs.patch_mtime }}
      do_debug:     ${{ steps.variants.outputs.do_debug }}
      do_release:   ${{ steps.variants.outputs.do_release }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Check if app/ or zip_update/ has any changes ──────────────────────
      #
      #   Skip the build entirely when the push touches neither app/ nor
      #   zip_update/ (e.g. only README, .github/, keys/, or other root
      #   files changed). This is stricter than the old "only .github/" check
      #   and avoids unnecessary builds for any non-code change.
      #
      - name: Check if app/ or zip_update/ changed
        id: relevance
        if: github.event_name == 'push'
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          if [ -z "$CHANGED" ]; then
            echo "no_relevant_changes=false" >> "$GITHUB_OUTPUT"
          else
            RELEVANT=$(echo "$CHANGED" | grep -E '^(app/|zip_update/)' || true)
            if [ -z "$RELEVANT" ]; then
              echo "ℹ️  No changes in app/ or zip_update/ — skipping build"
              echo "no_relevant_changes=true" >> "$GITHUB_OUTPUT"
            else
              echo "Relevant changes detected:"
              echo "$RELEVANT"
              echo "no_relevant_changes=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      # ── Look for a patch zip in zip_update/patches/ ──────────────────────
      - name: Find patch zip
        id: find_patch
        run: |
          ZIP=$(find zip_update/patches -maxdepth 1 -name 'update_*.zip' 2>/dev/null \
                | sort -t_ -k2 -n | tail -n1 || echo "")

          if [ -n "$ZIP" ]; then
            MTIME=$(stat -c '%y' "$ZIP" | cut -d'.' -f1)
            echo "patch_found=true"   >> "$GITHUB_OUTPUT"
            echo "patch_path=$ZIP"    >> "$GITHUB_OUTPUT"
            echo "patch_mtime=$MTIME" >> "$GITHUB_OUTPUT"
            echo "Found patch: $ZIP  (mtime: $MTIME)"
          else
            echo "patch_found=false" >> "$GITHUB_OUTPUT"
            echo "patch_path="       >> "$GITHUB_OUTPUT"
            echo "patch_mtime="      >> "$GITHUB_OUTPUT"
            echo ""
            echo "##################################################"
            echo "#                                                #"
            echo "#   WARNING: No update_*.zip found in           #"
            echo "#   zip_update/patches/                          #"
            echo "#                                                #"
            echo "#   Build will proceed using current source.     #"
            echo "#   To apply a patch, place a zip named          #"
            echo "#   update_<timestamp>.zip in zip_update/patches/#"
            echo "#                                                #"
            echo "##################################################"
            echo ""
          fi

      - name: Check if patch already released
        id: already_released
        if: steps.find_patch.outputs.patch_found == 'true'
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          PATCH_MTIME: ${{ steps.find_patch.outputs.patch_mtime }}
        run: |
          RELEASED=$(gh release list --limit 50 --json body \
            -q ".[].body" 2>/dev/null \
            | grep -F "$PATCH_MTIME" || echo "")
          if [ -n "$RELEASED" ]; then
            echo "already=true"  >> "$GITHUB_OUTPUT"
            echo "ℹ️  This patch was already released"
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Read build flag from CHANGELOG.md first line ─────────────────────
      #
      #   First line of zip_update/CHANGELOG.md controls APK compilation:
      #
      #     #!build      →  apply patch + compile APK + create GitHub Release
      #     #!no-build   →  apply patch only, skip compilation and release
      #
      #   If the flag is absent, #!build is assumed (default).
      #   workflow_dispatch with force_build=true always compiles regardless.
      #
      #   The flag is read from inside the zip (not the repo file) so it
      #   reflects the new patch, not the previously committed CHANGELOG.md.
      #
      - name: Read build flag from CHANGELOG.md
        id: build_flag
        env:
          PATCH_FOUND: ${{ steps.find_patch.outputs.patch_found }}
          PATCH_PATH:  ${{ steps.find_patch.outputs.patch_path }}
        run: |
          FLAG="build"
          FIRST_LINE=""

          if [ "$PATCH_FOUND" = "true" ] && [ -n "$PATCH_PATH" ]; then
            TMP_DIR=$(mktemp -d)
            if unzip -p "$PATCH_PATH" "zip_update/CHANGELOG.md" \
                 > "$TMP_DIR/CHANGELOG.md" 2>/dev/null \
               && [ -s "$TMP_DIR/CHANGELOG.md" ]; then
              FIRST_LINE=$(head -1 "$TMP_DIR/CHANGELOG.md" | tr -d '[:space:]')
              echo "Read flag from zip CHANGELOG.md: '$FIRST_LINE'"
            else
              echo "No CHANGELOG.md inside zip — falling back to repo file"
            fi
            rm -rf "$TMP_DIR"
          fi

          if [ -z "$FIRST_LINE" ]; then
            CHANGELOG="zip_update/CHANGELOG.md"
            if [ -f "$CHANGELOG" ]; then
              FIRST_LINE=$(head -1 "$CHANGELOG" | tr -d '[:space:]')
              echo "Read flag from repo CHANGELOG.md: '$FIRST_LINE'"
            else
              echo "No CHANGELOG.md found anywhere — defaulting to #!build"
            fi
          fi

          case "$FIRST_LINE" in
            "#!no-build")
              FLAG="no-build"
              echo "Build flag: #!no-build — APK compilation will be skipped"
              ;;
            "#!build")
              FLAG="build"
              echo "Build flag: #!build — APK compilation enabled"
              ;;
            *)
              echo "No recognised build flag — defaulting to #!build (compile)"
              ;;
          esac

          echo "flag=$FLAG" >> "$GITHUB_OUTPUT"

      - name: Decide whether to build
        id: decision
        env:
          EVENT:               ${{ github.event_name }}
          NO_RELEVANT_CHANGES: ${{ steps.relevance.outputs.no_relevant_changes }}
          PATCH_FOUND:         ${{ steps.find_patch.outputs.patch_found }}
          ALREADY_RELEASED:    ${{ steps.already_released.outputs.already }}
          FORCE:               ${{ github.event.inputs.force_build }}
          BUILD_FLAG:          ${{ steps.build_flag.outputs.flag }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ] && [ "$FORCE" = "true" ]; then
            echo "should_build=true"  >> "$GITHUB_OUTPUT"
            echo "compile_apk=true"   >> "$GITHUB_OUTPUT"
            echo "Force build — compiling APK"

          elif [ "$NO_RELEVANT_CHANGES" = "true" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "compile_apk=false"  >> "$GITHUB_OUTPUT"
            echo "Skipping: no changes in app/ or zip_update/"

          elif [ "$PATCH_FOUND" = "true" ] && [ "$ALREADY_RELEASED" = "true" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "compile_apk=false"  >> "$GITHUB_OUTPUT"
            echo "Skipping: patch already released"

          elif [ "$BUILD_FLAG" = "no-build" ]; then
            echo "should_build=true"  >> "$GITHUB_OUTPUT"
            echo "compile_apk=false"  >> "$GITHUB_OUTPUT"
            echo "Patch-only mode (#!no-build) — will apply patch, skip APK compilation"

          else
            echo "should_build=true"  >> "$GITHUB_OUTPUT"
            echo "compile_apk=true"   >> "$GITHUB_OUTPUT"
            echo "Will apply patch and compile APK"
          fi

      - name: Resolve build variants
        id: variants
        env:
          EVENT:         ${{ github.event_name }}
          INPUT_DEBUG:   ${{ github.event.inputs.build_debug }}
          INPUT_RELEASE: ${{ github.event.inputs.build_release }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            DO_DEBUG="${INPUT_DEBUG}"
            DO_RELEASE="${INPUT_RELEASE}"
            if [ "$DO_DEBUG" != "true" ] && [ "$DO_RELEASE" != "true" ]; then
              echo "⚠️  Neither variant selected — defaulting to release only"
              DO_RELEASE="true"
            fi
          else
            DO_DEBUG="false"
            DO_RELEASE="true"
          fi
          echo "do_debug=$DO_DEBUG"     >> "$GITHUB_OUTPUT"
          echo "do_release=$DO_RELEASE" >> "$GITHUB_OUTPUT"
          echo "Variants → debug=$DO_DEBUG  release=$DO_RELEASE"

# ════════════════════════════════════════════════════════════════════════════
# Job 2 — Build & Release
# ════════════════════════════════════════════════════════════════════════════
  build:
    name: Build & Release APK
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Extract patch zip ──────────────────────────────────────────────
      - name: Extract patch zip
        if: needs.check.outputs.patch_found == 'true'
        env:
          PATCH_PATH: ${{ needs.check.outputs.patch_path }}
        run: |
          echo "Extracting: $PATCH_PATH"
          mkdir -p _patch_tmp
          unzip -o "$PATCH_PATH" -d _patch_tmp

          echo "── Patch contents ──────────────────"
          find _patch_tmp -type f | sort | sed "s|_patch_tmp/||"
          echo "────────────────────────────────────"

          if find _patch_tmp -type d -name '.github' | grep -q '.'; then
            echo "FATAL: patch zip contains .github/ — aborting to protect workflow files"
            exit 1
          fi

          rsync -av --exclude='.github' _patch_tmp/ .
          rm -rf _patch_tmp
          echo "✅ Patch extracted to repo root"

      # ── 3. Run apply.sh if present ────────────────────────────────────────
      - name: Run apply.sh
        if: needs.check.outputs.patch_found == 'true'
        run: |
          APPLY_SH="zip_update/patches/apply.sh"
          if [ -f "$APPLY_SH" ]; then
            echo "Found $APPLY_SH — executing..."
            echo "── apply.sh output ─────────────────"
            chmod +x "$APPLY_SH"
            bash "$APPLY_SH"
            EXIT=$?
            echo "────────────────────────────────────"
            if [ $EXIT -ne 0 ]; then
              echo "apply.sh exited with code $EXIT — aborting build"
              exit $EXIT
            fi
            echo "✅ apply.sh completed successfully"
          else
            echo "No apply.sh found — skipping"
          fi

      # ── 4. Commit patch changes & clean up ───────────────────────────────
      - name: Commit patch changes & clean up
        if: needs.check.outputs.patch_found == 'true'
        env:
          COMPILE_APK: ${{ needs.check.outputs.compile_apk }}
        run: |
          rm -f zip_update/patches/*.zip
          rm -f zip_update/patches/apply.sh
          echo "Removed patch zip and apply.sh from zip_update/patches/ (directory preserved)"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            CHANGELOG="zip_update/CHANGELOG.md"
            if [ -f "$CHANGELOG" ]; then
              NOTE=$(grep -v '^#!' "$CHANGELOG" | head -80)
              if [ "$COMPILE_APK" = "true" ]; then
                COMMIT_MSG=$(printf 'apply patch [skip ci]\n\n%s' "$NOTE")
              else
                COMMIT_MSG=$(printf 'apply patch (no-build) [skip ci]\n\n%s' "$NOTE")
              fi
            else
              COMMIT_MSG="apply patch [skip ci]"
            fi
            git commit -m "$COMMIT_MSG"
            git push origin HEAD
            echo "✅ Commit pushed"
          fi

      # ── 4b. Update repo snapshot ──────────────────────────────────────────
      - name: Update repo snapshot
        if: needs.check.outputs.patch_found == 'true'
        run: |
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SHA=$(git rev-parse HEAD)
          {
            echo "# Repository Snapshot"
            echo ""
            echo "> Updated: \`$NOW\`"
            echo "> Commit:  \`$SHA\`"
            echo ""
            echo '```'
            find . -type f \
              ! -path './.git/*' \
              ! -path './build/*' \
              ! -path './.gradle/*' \
              ! -path './app/build/*' \
              ! -name '*.zip' \
              | sort
            echo '```'
          } > zip_update/repo_snapshot.md

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zip_update/repo_snapshot.md
          if git diff --cached --quiet; then
            echo "repo_snapshot.md unchanged"
          else
            git commit -m "update repo_snapshot.md [skip ci]"
            git push origin HEAD
            echo "✅ repo_snapshot.md updated"
          fi

      # ── 5. Compute next version tag ───────────────────────────────────────
      - name: Compute next version tag
        id: version
        if: needs.check.outputs.compile_apk == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release view --json tagName -q '.tagName' 2>/dev/null \
                   | grep -E '^v1\.[0-9]+$' || echo "")

          if [ -z "$LATEST" ]; then
            NEXT="v1.001"
          else
            SEQ=$(echo "$LATEST" | sed 's/v1\.//')
            NEXT_SEQ=$(printf "%03d" $((10#$SEQ + 1)))
            NEXT="v1.$NEXT_SEQ"
          fi

          echo "✅ Latest: ${LATEST:-none}  →  Next: $NEXT"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

      # ── 5b. Stamp versionName & versionCode ───────────────────────────────
      - name: Stamp version in build.gradle.kts
        if: needs.check.outputs.compile_apk == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          SEQ=$(echo "$VERSION" | sed 's/1\.//')
          VCODE=$((10#$SEQ))

          sed -i "s/versionName = \"[^\"]*\"/versionName = \"$VERSION\"/" app/build.gradle.kts
          sed -i "s/versionCode = [0-9]*/versionCode = $VCODE/"           app/build.gradle.kts

          echo "✅ versionName=$VERSION  versionCode=$VCODE"
          grep -E 'versionCode|versionName' app/build.gradle.kts

      # ── 6. Set up JDK 17 ─────────────────────────────────────────────────
      - name: Set up JDK 17
        if: needs.check.outputs.compile_apk == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 7. Ensure gradle-wrapper.jar ─────────────────────────────────────
      - name: Ensure gradle-wrapper.jar
        if: needs.check.outputs.compile_apk == 'true'
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar missing — downloading..."
            curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
              https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar
          fi

      # ── 8. Cache Gradle ───────────────────────────────────────────────────
      - name: Cache Gradle
        if: needs.check.outputs.compile_apk == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 9. Grant execute permission ───────────────────────────────────────
      - name: Grant execute permission for gradlew
        if: needs.check.outputs.compile_apk == 'true'
        run: chmod +x gradlew

      # ── 10. Build Debug APK ───────────────────────────────────────────────
      - name: Build Debug APK
        if: needs.check.outputs.compile_apk == 'true' && needs.check.outputs.do_debug == 'true'
        run: ./gradlew assembleDebug --no-daemon --build-cache
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      # ── 11. Load keystore credentials ─────────────────────────────────────
      - name: Load keystore credentials
        if: needs.check.outputs.compile_apk == 'true' && needs.check.outputs.do_release == 'true'
        run: |
          PROPS="keys/keystore.properties"
          KEYSTORE_OK=true

          if [ ! -f "$PROPS" ]; then
            KEYSTORE_OK=false
            echo "::warning::keystore.properties not found"
          else
            while IFS='=' read -r key value; do
              [[ "$key" =~ ^#.*$ || -z "$key" ]] && continue
              key=$(echo "$key" | xargs)
              value=$(echo "$value" | xargs)
              echo "::add-mask::$value"
              echo "${key}=${value}" >> "$GITHUB_ENV"
            done < "$PROPS"

            JKS="keys/release.jks"
            if [ ! -f "$JKS" ]; then
              KEYSTORE_OK=false
              echo "::warning::release.jks not found"
            fi
          fi

          if [ "$KEYSTORE_OK" = "false" ]; then
            echo ""
            echo "##################################################"
            echo "#                                                #"
            echo "#   ⚠️  WARNING: RELEASE KEY LOAD FAILED  ⚠️    #"
            echo "#                                                #"
            echo "#   The release APK will be signed with the     #"
            echo "#   DEBUG key. It cannot be published to the    #"
            echo "#   Play Store and should NOT be distributed.   #"
            echo "#                                                #"
            echo "#   To fix: ensure keys/keystore.properties     #"
            echo "#   and keys/release.jks are present.           #"
            echo "#                                                #"
            echo "##################################################"
            echo ""
          else
            echo "✅ Keystore credentials loaded from $PROPS"
          fi

      # ── 12. Build Release APK ─────────────────────────────────────────────
      - name: Build Release APK
        if: needs.check.outputs.compile_apk == 'true' && needs.check.outputs.do_release == 'true'
        run: ./gradlew assembleRelease --no-daemon --build-cache
        env:
          GRADLE_OPTS:   "-Dorg.gradle.jvmargs=-Xmx4g"
          KEYSTORE_PATH: ${{ github.workspace }}/keys/release.jks

      # ── 13. Upload APK artifacts ──────────────────────────────────────────
      - name: Upload Debug APK artifact
        if: needs.check.outputs.compile_apk == 'true' && needs.check.outputs.do_debug == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK artifact
        if: needs.check.outputs.compile_apk == 'true' && needs.check.outputs.do_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

      # ── 14. Create GitHub Release ─────────────────────────────────────────
      - name: Create GitHub Release
        if: needs.check.outputs.compile_apk == 'true'
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          TAG:         ${{ steps.version.outputs.tag }}
          PATCH_MTIME: ${{ needs.check.outputs.patch_mtime }}
        run: |
          CHANGELOG="zip_update/CHANGELOG.md"
          if [ -f "$CHANGELOG" ]; then
            BODY=$(grep -v '^#!' "$CHANGELOG" | head -120)
          else
            BODY="Auto build — no changelog provided."
          fi

          BODY=$(printf '%s\n\n---\n_patch mtime: %s_' "$BODY" "$PATCH_MTIME")

          UPLOAD_FILES=""
          for f in \
            app/build/outputs/apk/debug/app-debug.apk \
            app/build/outputs/apk/release/app-release.apk; do
            [ -f "$f" ] && UPLOAD_FILES="$UPLOAD_FILES $f"
          done

          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes "$BODY" \
            $UPLOAD_FILES

          echo "✅ Released: $TAG"

# ════════════════════════════════════════════════════════════════════════════
# Job 3 — Cleanup old releases & workflow runs (runs after every release)
# ════════════════════════════════════════════════════════════════════════════
  cleanup:
    name: Cleanup Old Releases & Runs
    needs: [check, build]
    # Only run after a successful build that created a release
    if: |
      needs.check.outputs.compile_apk == 'true' &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # delete releases & tags
      actions: write    # delete workflow runs

    steps:
      # ── Keep newest 10 releases ───────────────────────────────────────────
      - name: 🧹 Delete old releases (keep newest 10)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          KEEP:     10
        run: |
          set -e
          echo "── Releases ──────────────────────────────────"

          # IDs are returned newest-first by the API
          RELEASE_IDS=$(gh api "repos/$REPO/releases" \
            --paginate \
            --jq '.[].id' \
            | head -200)

          TOTAL=$(echo "$RELEASE_IDS" | grep -c . || true)
          echo "Total releases: $TOTAL  |  Keeping newest: $KEEP"

          if [ "$TOTAL" -le "$KEEP" ]; then
            echo "Nothing to delete."
          else
            TO_DELETE=$(echo "$RELEASE_IDS" | tail -n "+$(( KEEP + 1 ))")
            COUNT=$(echo "$TO_DELETE" | grep -c . || true)
            echo "Deleting $COUNT old release(s)..."

            echo "$TO_DELETE" | while read -r rid; do
              [ -z "$rid" ] && continue
              TAG=$(gh api "repos/$REPO/releases/$rid" --jq '.tag_name' 2>/dev/null || echo "")
              gh api --method DELETE "repos/$REPO/releases/$rid" && \
                echo "  ✅ Deleted release $rid  (tag: ${TAG:-unknown})" || \
                echo "  ⚠️  Failed to delete release $rid"
              if [ -n "$TAG" ]; then
                gh api --method DELETE "repos/$REPO/git/refs/tags/$TAG" 2>/dev/null && \
                  echo "     🏷️  Deleted tag $TAG" || \
                  echo "     ⚠️  Tag $TAG not found or already deleted"
              fi
            done
          fi

      # ── Keep newest 10 runs per workflow ──────────────────────────────────
      - name: 🧹 Delete old workflow runs (keep newest 10 per workflow)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          KEEP:     10
        run: |
          set -e
          echo "── Workflow Runs ──────────────────────────────"

          WORKFLOW_IDS=$(gh api "repos/$REPO/actions/workflows" \
            --paginate \
            --jq '.workflows[].id')

          for WF_ID in $WORKFLOW_IDS; do
            WF_NAME=$(gh api "repos/$REPO/actions/workflows/$WF_ID" \
              --jq '.name' 2>/dev/null || echo "id=$WF_ID")
            echo ""
            echo "  Workflow: $WF_NAME (id=$WF_ID)"

            RUN_IDS=$(gh api "repos/$REPO/actions/workflows/$WF_ID/runs" \
              --paginate \
              --jq '.workflow_runs[].id' \
              | head -200)

            TOTAL=$(echo "$RUN_IDS" | grep -c . || true)
            echo "  Total runs: $TOTAL  |  Keeping newest: $KEEP"

            if [ "$TOTAL" -le "$KEEP" ]; then
              echo "  Nothing to delete."
              continue
            fi

            TO_DELETE=$(echo "$RUN_IDS" | tail -n "+$(( KEEP + 1 ))")
            COUNT=$(echo "$TO_DELETE" | grep -c . || true)
            echo "  Deleting $COUNT old run(s)..."

            echo "$TO_DELETE" | while read -r run_id; do
              [ -z "$run_id" ] && continue
              gh api --method DELETE "repos/$REPO/actions/runs/$run_id" && \
                echo "    ✅ Deleted run $run_id" || \
                echo "    ⚠️  Failed to delete run $run_id"
            done
          done

          echo ""
          echo "=== Cleanup complete ==="

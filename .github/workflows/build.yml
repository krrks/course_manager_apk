name: Build & Release APK

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build (ignore zip timestamp check)'
        required: false
        default: true
        type: boolean
      build_debug:
        description: 'Build Debug APK'
        required: false
        default: false
        type: boolean
      build_release:
        description: 'Build Release APK'
        required: false
        default: true
        type: boolean

# ════════════════════════════════════════════════════════════════════════════
# Job 1 — Pre-flight checks
# ════════════════════════════════════════════════════════════════════════════
jobs:
  check:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_build: ${{ steps.decision.outputs.should_build }}
      patch_found:  ${{ steps.find_patch.outputs.patch_found }}
      patch_path:   ${{ steps.find_patch.outputs.patch_path }}
      patch_mtime:  ${{ steps.find_patch.outputs.patch_mtime }}
      do_debug:     ${{ steps.variants.outputs.do_debug }}
      do_release:   ${{ steps.variants.outputs.do_release }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if only .github files changed
        id: github_only
        if: github.event_name == 'push'
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          if [ -z "$CHANGED" ]; then
            echo "only_github=false" >> "$GITHUB_OUTPUT"
          else
            NON_GITHUB=$(echo "$CHANGED" | grep -v '^\.github/' || true)
            if [ -z "$NON_GITHUB" ]; then
              echo "ℹ️  Only .github/ files changed — skipping build"
              echo "only_github=true" >> "$GITHUB_OUTPUT"
            else
              echo "only_github=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      # ── Look for a patch zip in zip_update/patches/ ──────────────────────
      - name: Find patch zip
        id: find_patch
        run: |
          ZIP=$(find zip_update/patches -maxdepth 1 -name 'update_*.zip' 2>/dev/null \
                | sort -t_ -k2 -n | tail -n1 || echo "")

          if [ -n "$ZIP" ]; then
            MTIME=$(stat -c '%y' "$ZIP" | cut -d'.' -f1)
            echo "patch_found=true"  >> "$GITHUB_OUTPUT"
            echo "patch_path=$ZIP"   >> "$GITHUB_OUTPUT"
            echo "patch_mtime=$MTIME" >> "$GITHUB_OUTPUT"
            echo "✅ Found patch: $ZIP  (mtime: $MTIME)"
          else
            echo "patch_found=false" >> "$GITHUB_OUTPUT"
            echo "patch_path="       >> "$GITHUB_OUTPUT"
            echo "patch_mtime="      >> "$GITHUB_OUTPUT"
            echo ""
            echo "##################################################"
            echo "#                                                #"
            echo "#   ⚠️  WARNING: No update_*.zip found in       #"
            echo "#   zip_update/patches/                          #"
            echo "#                                                #"
            echo "#   Build will proceed using current source.     #"
            echo "#   To apply a patch, place a zip named          #"
            echo "#   update_<timestamp>.zip in zip_update/patches/#"
            echo "#                                                #"
            echo "##################################################"
            echo ""
          fi

      - name: Check if patch already released
        id: already_released
        if: steps.find_patch.outputs.patch_found == 'true'
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          PATCH_MTIME: ${{ steps.find_patch.outputs.patch_mtime }}
        run: |
          RELEASED=$(gh release list --limit 50 --json body \
            -q ".[].body" 2>/dev/null \
            | grep -F "$PATCH_MTIME" || echo "")
          if [ -n "$RELEASED" ]; then
            echo "already=true"  >> "$GITHUB_OUTPUT"
            echo "ℹ️  This patch was already released"
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide whether to build
        id: decision
        env:
          EVENT:            ${{ github.event_name }}
          ONLY_GITHUB:      ${{ steps.github_only.outputs.only_github }}
          PATCH_FOUND:      ${{ steps.find_patch.outputs.patch_found }}
          ALREADY_RELEASED: ${{ steps.already_released.outputs.already }}
          FORCE:            ${{ github.event.inputs.force_build }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ] && [ "$FORCE" = "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "✅ Force build requested"
          elif [ "$ONLY_GITHUB" = "true" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  Skipping: only .github/ changed"
          elif [ "$PATCH_FOUND" = "true" ] && [ "$ALREADY_RELEASED" = "true" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  Skipping: patch already released"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "✅ Will build"
          fi

      - name: Resolve build variants
        id: variants
        env:
          EVENT:         ${{ github.event_name }}
          INPUT_DEBUG:   ${{ github.event.inputs.build_debug }}
          INPUT_RELEASE: ${{ github.event.inputs.build_release }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            DO_DEBUG="${INPUT_DEBUG}"
            DO_RELEASE="${INPUT_RELEASE}"
            if [ "$DO_DEBUG" != "true" ] && [ "$DO_RELEASE" != "true" ]; then
              echo "⚠️  Neither variant selected — defaulting to release only"
              DO_RELEASE="true"
            fi
          else
            DO_DEBUG="false"
            DO_RELEASE="true"
          fi
          echo "do_debug=$DO_DEBUG"     >> "$GITHUB_OUTPUT"
          echo "do_release=$DO_RELEASE" >> "$GITHUB_OUTPUT"
          echo "Variants → debug=$DO_DEBUG  release=$DO_RELEASE"

# ════════════════════════════════════════════════════════════════════════════
# Job 2 — Build & Release
# ════════════════════════════════════════════════════════════════════════════
  build:
    name: Build & Release APK
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Extract patch zip ──────────────────────────────────────────────
      - name: Extract patch zip
        if: needs.check.outputs.patch_found == 'true'
        env:
          PATCH_PATH: ${{ needs.check.outputs.patch_path }}
        run: |
          echo "Extracting: $PATCH_PATH"
          mkdir -p _patch_tmp
          unzip -o "$PATCH_PATH" -d _patch_tmp

          echo "── Patch contents ──────────────────"
          find _patch_tmp -type f | sort | sed "s|_patch_tmp/||"
          echo "────────────────────────────────────"

          if find _patch_tmp -type d -name '.github' | grep -q '.'; then
            echo "FATAL: patch zip contains .github/ — aborting to protect workflow files"
            exit 1
          fi

          rsync -av --exclude='.github' _patch_tmp/ .
          rm -rf _patch_tmp
          echo "✅ Patch extracted to repo root"

      # ── 3. Run apply.sh if present ────────────────────────────────────────
      - name: Run apply.sh
        if: needs.check.outputs.patch_found == 'true'
        run: |
          APPLY_SH="zip_update/apply.sh"
          if [ -f "$APPLY_SH" ]; then
            echo "Found $APPLY_SH — executing..."
            echo "── apply.sh output ─────────────────"
            chmod +x "$APPLY_SH"
            bash "$APPLY_SH"
            EXIT=$?
            echo "────────────────────────────────────"
            if [ $EXIT -ne 0 ]; then
              echo "apply.sh exited with code $EXIT — aborting build"
              exit $EXIT
            fi
            echo "✅ apply.sh completed successfully"
          else
            echo "No apply.sh found — skipping"
          fi

      # ── 4. Compute next version tag ───────────────────────────────────────
      - name: Compute next version tag
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release list --limit 20 --json tagName \
                   -q '.[].tagName' 2>/dev/null \
                   | grep -E '^v1\.[0-9]+$' \
                   | sort -t. -k2 -n \
                   | tail -n1 || echo "")

          if [ -z "$LATEST" ]; then
            NEXT="v1.001"
          else
            SEQ=$(echo "$LATEST" | sed 's/v1\.//')
            NEXT_SEQ=$(printf "%03d" $((10#$SEQ + 1)))
            NEXT="v1.$NEXT_SEQ"
          fi

          echo "✅ Next version: $NEXT"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

      # ── 5. Stamp versionName & versionCode ───────────────────────────────
      - name: Stamp version in build.gradle.kts
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          SEQ=$(echo "$VERSION" | sed 's/1\.//')
          VCODE=$((10#$SEQ))

          sed -i "s/versionName = \"[^\"]*\"/versionName = \"$VERSION\"/" app/build.gradle.kts
          sed -i "s/versionCode = [0-9]*/versionCode = $VCODE/"           app/build.gradle.kts

          echo "✅ versionName=$VERSION  versionCode=$VCODE"
          grep -E 'versionCode|versionName' app/build.gradle.kts

      # ── 6. Set up JDK 17 ─────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 7. Ensure gradle-wrapper.jar ─────────────────────────────────────
      - name: Ensure gradle-wrapper.jar
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "Downloading gradle-wrapper.jar..."
            mkdir -p gradle/wrapper
            curl -fsSL \
              "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
          fi
          chmod +x ./gradlew

      # ── 8. Cache Gradle ───────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 9. Load signing keystore ─────────────────────────────────────────
      - name: Load keystore
        id: load_ks
        run: |
          PROPS="keys/keystore.properties"
          if [ -f "$PROPS" ]; then
            echo "✅ Found $PROPS — loading signing credentials"
            while IFS='=' read -r key value; do
              key="${key// /}"
              [[ -z "$key" || "$key" == \#* ]] && continue
              echo "::add-mask::$value"
              echo "${key}=${value}" >> "$GITHUB_ENV"
            done < "$PROPS"
            echo "has_keystore=true" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️  $PROPS not found — release APK will use debug signing"
            echo "has_keystore=false" >> "$GITHUB_OUTPUT"
          fi

      # ── 10. Build Debug APK ───────────────────────────────────────────────
      - name: Build Debug APK
        if: needs.check.outputs.do_debug == 'true'
        run: ./gradlew assembleDebug --no-daemon --build-cache
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      # ── 11. Build Release APK ─────────────────────────────────────────────
      - name: Build Release APK
        if: needs.check.outputs.do_release == 'true'
        run: ./gradlew assembleRelease --no-daemon --build-cache
        env:
          GRADLE_OPTS:   "-Dorg.gradle.jvmargs=-Xmx4g"
          KEYSTORE_PATH: ${{ github.workspace }}/keys/release.jks

      # ── 12. Upload APK artifacts ──────────────────────────────────────────
      - name: Upload Debug APK artifact
        if: needs.check.outputs.do_debug == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK artifact
        if: needs.check.outputs.do_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

      # ── 13. Commit changes, clean up patch files ──────────────────────────
      - name: Commit patch changes & clean up
        if: needs.check.outputs.patch_found == 'true'
        run: |
          rm -f zip_update/patches/*.zip
          rm -f zip_update/apply.sh
          echo "Removed patch zip and apply.sh"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            CHANGELOG="zip_update/CHANGELOG.md"
            if [ -f "$CHANGELOG" ]; then
              NOTE=$(head -80 "$CHANGELOG")
              COMMIT_MSG=$(printf 'apply patch [skip ci]\n\n%s' "$NOTE")
            else
              COMMIT_MSG="apply patch [skip ci]"
            fi
            git commit -m "$COMMIT_MSG"
            git push origin HEAD
            echo "✅ Commit pushed"
          fi

      # ── 14. Update repo snapshot ──────────────────────────────────────────
      - name: Update repo snapshot
        if: needs.check.outputs.patch_found == 'true'
        run: |
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SHA=$(git rev-parse HEAD)
          {
            echo "# Repository Snapshot"
            echo ""
            echo "> Updated: \`$NOW\`"
            echo "> Commit:  \`$SHA\`"
            echo ""
            echo '```'
            find . -type f \
              ! -path './.git/*' \
              ! -path './build/*' \
              ! -path './.gradle/*' \
              ! -path './app/build/*' \
              ! -name '*.zip' \
              | sort
            echo '```'
          } > zip_update/repo_snapshot.md

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zip_update/repo_snapshot.md
          if git diff --cached --quiet; then
            echo "repo_snapshot.md unchanged"
          else
            git commit -m "update repo_snapshot.md [skip ci]"
            git push origin HEAD
            echo "✅ repo_snapshot.md updated"
          fi

      # ── 15. Create GitHub Release ─────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          TAG:         ${{ steps.version.outputs.tag }}
          PATCH_MTIME: ${{ needs.check.outputs.patch_mtime }}
        run: |
          CHANGELOG="zip_update/CHANGELOG.md"
          if [ -f "$CHANGELOG" ]; then
            BODY=$(head -120 "$CHANGELOG")
          else
            BODY="Auto build — no changelog provided."
          fi

          # Append patch mtime for duplicate-release detection
          BODY=$(printf '%s\n\n---\n_patch mtime: %s_' "$BODY" "$PATCH_MTIME")

          UPLOAD_FILES=""
          for f in \
            app/build/outputs/apk/debug/app-debug.apk \
            app/build/outputs/apk/release/app-release.apk; do
            [ -f "$f" ] && UPLOAD_FILES="$UPLOAD_FILES $f"
          done

          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes "$BODY" \
            $UPLOAD_FILES

          echo "✅ Released: $TAG"

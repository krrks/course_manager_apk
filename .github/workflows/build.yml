name: 🔨 Auto Build & Sync APK

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Sync source from zip (if uploaded) ────────────────────────────────
      - name: 📦 Sync from school-manager-android*.zip (if present)
        run: |
          TARGET_ZIP=$(ls school-manager-android*.zip 2>/dev/null | sort | head -n 1)
          if [ -n "$TARGET_ZIP" ]; then
            echo "✅ Found $TARGET_ZIP — extracting..."
            echo "PROCESSED_ZIP=$TARGET_ZIP" >> "$GITHUB_ENV"
            unzip -o "$TARGET_ZIP" -d _zip_tmp
            if [ -d "_zip_tmp/school-manager-android" ]; then
              # Exclude .github so build.yml is never overwritten by the zip
              rsync -av --exclude='.github' _zip_tmp/school-manager-android/. .
              echo "✅ Synced zip contents to root (skipped .github/)"
            else
              echo "⚠️  Expected folder school-manager-android/ inside zip — skipping"
            fi
            rm -rf _zip_tmp
          else
            echo "ℹ️  No school-manager-android*.zip found — skipping sync step"
            echo "PROCESSED_ZIP=" >> "$GITHUB_ENV"
          fi

      # ── 3. One-time cleanup: remove files that should never be in the repo ───
      - name: 🧹 Untrack & remove previously committed junk
        run: |
          changed=0

          # Gradle environment dirs — large, belong in Actions cache, not git
          for path in .gradle build app/build; do
            if git ls-files --error-unmatch "$path" >/dev/null 2>&1 \
               || git ls-files "$path" | grep -q .; then
              git rm -r --cached --ignore-unmatch "$path" 2>/dev/null || true
              rm -rf "$path"
              echo "🗑️  Untracked & removed: $path"
              changed=1
            fi
          done

          # Unnecessary loose files committed in the past
          for file in \
            "gradle/wrapper/README.txt" \
            "gradle/wrapper/gradle-wrapper.jar.bak"; do
            if git ls-files --error-unmatch "$file" >/dev/null 2>&1; then
              git rm --cached --ignore-unmatch "$file" 2>/dev/null || true
              rm -f "$file"
              echo "🗑️  Untracked & removed: $file"
              changed=1
            fi
          done

          # Any other file > 50 MB that somehow got tracked
          git ls-files | while IFS= read -r f; do
            if [ -f "$f" ]; then
              size=$(stat -c%s "$f" 2>/dev/null || echo 0)
              if [ "$size" -gt 52428800 ]; then
                git rm --cached --ignore-unmatch "$f" 2>/dev/null || true
                rm -f "$f"
                echo "🗑️  Removed oversized tracked file: $f"
              fi
            fi
          done

          echo "JUNK_CLEANED=$changed" >> "$GITHUB_ENV"

      # ── 4. JDK ───────────────────────────────────────────────────────────────
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 5. Gradle wrapper JAR (tiny ~60 KB, safe to commit) ──────────────────
      - name: 📦 Ensure gradle-wrapper.jar exists
        run: |
          if [ -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "✅ gradle-wrapper.jar present"
          else
            echo "⬇️  Downloading gradle-wrapper.jar..."
            mkdir -p gradle/wrapper
            curl -fsSL \
              "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
          fi
          chmod +x ./gradlew

      # ── 6. Restore Gradle caches from Actions cache (not from repo) ──────────
      #
      #  Cached paths (runner home, never committed to git):
      #    ~/.gradle/wrapper/dists   — Gradle distribution zip + unpacked (~120 MB)
      #    ~/.gradle/caches/modules  — Maven/Gradle dependency jars   (~200 MB)
      #    ~/.gradle/caches/build-cache-* — incremental build outputs
      #
      #  Cache key invalidates when any gradle config file changes.
      #  Restore keys allow a partial hit so at least deps are reused.
      - name: 💾 Restore Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper/dists
            ~/.gradle/caches/modules-*
            ~/.gradle/caches/jars-*
            ~/.gradle/caches/build-cache-*
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties','**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 7. Build ──────────────────────────────────────────────────────────────
      - name: 🔧 Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --build-cache \
            --configuration-cache \
            -Dorg.gradle.parallel=true
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:+UseParallelGC"

      - name: 🚀 Build Release APK
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --build-cache \
            --configuration-cache \
            -Dorg.gradle.parallel=true
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:+UseParallelGC"

      # ── 8. Copy APKs ──────────────────────────────────────────────────────────
      - name: 📂 Copy APKs to /apk folder
        run: |
          mkdir -p apk
          cp app/build/outputs/apk/debug/app-debug.apk     apk/app-debug.apk
          cp app/build/outputs/apk/release/app-release.apk apk/app-release.apk

      # ── 9. Delete uploaded zip ────────────────────────────────────────────────
      - name: 🗑️ Delete processed zip (if present)
        run: |
          if [ -n "$PROCESSED_ZIP" ] && [ -f "$PROCESSED_ZIP" ]; then
            rm "$PROCESSED_ZIP"
            echo "✅ Deleted $PROCESSED_ZIP"
          else
            echo "ℹ️  No zip to delete"
          fi

      # ── 10. Ensure build/ and .gradle/ are gitignored going forward ───────────
      - name: 📝 Ensure .gitignore excludes build artifacts
        run: |
          GITIGNORE=".gitignore"
          touch "$GITIGNORE"

          add_if_missing() {
            grep -qxF "$1" "$GITIGNORE" || echo "$1" >> "$GITIGNORE"
          }

          add_if_missing ".gradle/"
          add_if_missing "build/"
          add_if_missing "app/build/"
          add_if_missing "*.zip"
          add_if_missing "local.properties"

          echo "✅ .gitignore up to date"

      # ── 11. Commit & push (source + APKs only, no Gradle env) ────────────────
      - name: 💾 Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage everything — .gitignore now excludes build/ and .gradle/
          git add -A

          if git diff --cached --quiet; then
            echo "ℹ️  Nothing changed — skipping commit"
          else
            git commit -m "ci: sync source, update APKs [skip ci]"
            git push
            echo "✅ Changes pushed"
          fi

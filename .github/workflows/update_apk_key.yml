name: 🔑 Generate & Update Release Keystore

# 手动触发：在仓库 Actions 页面点击 "Run workflow"
on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: 'Key alias（默认 release）'
        required: false
        default: 'release'
      validity_years:
        description: 'Key 有效期（年，默认 100）'
        required: false
        default: '100'

jobs:
  generate-key:
    name: 🔑 Generate Keystore
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 需要 push keys/ 目录
      # 注意：写入 Actions Variables 需要 ACTIONS_TOKEN（见下方说明）

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. 生成随机密码 & 生成 keystore ──────────────────────────────────
      - name: 🔐 Generate keystore
        id: keygen
        env:
          KEY_ALIAS:       ${{ github.event.inputs.key_alias }}
          VALIDITY_YEARS:  ${{ github.event.inputs.validity_years }}
        run: |
          set -e

          # 生成随机 32 字符密码
          STORE_PASS=$(openssl rand -base64 32 | tr -d '/+=' | head -c 32)
          KEY_PASS=$(openssl rand -base64 32 | tr -d '/+=' | head -c 32)

          echo "KEY_ALIAS=$KEY_ALIAS"
          echo "VALIDITY_YEARS=$VALIDITY_YEARS"

          mkdir -p keys

          # 生成 keystore（覆盖旧文件）
          keytool -genkeypair \
            -keystore keys/release.jks \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity $(( VALIDITY_YEARS * 365 )) \
            -storepass "$STORE_PASS" \
            -keypass "$KEY_PASS" \
            -dname "CN=SchoolManager, OU=App, O=SchoolManager, L=CN, S=CN, C=CN" \
            -storetype JKS \
            -noprompt

          echo "✅ Keystore generated: keys/release.jks"
          keytool -list -keystore keys/release.jks -storepass "$STORE_PASS" -v | head -20

          # 将密码写入 GITHUB_OUTPUT（masked）
          echo "::add-mask::$STORE_PASS"
          echo "::add-mask::$KEY_PASS"
          echo "store_pass=$STORE_PASS" >> "$GITHUB_OUTPUT"
          echo "key_pass=$KEY_PASS"     >> "$GITHUB_OUTPUT"
          echo "key_alias=$KEY_ALIAS"   >> "$GITHUB_OUTPUT"

      # ── 3. 把密码写入 GitHub Actions Repository Variables ─────────────────
      # GitHub Actions Variables (vars.*) 是明文，适合存非敏感配置。
      # 密码属于敏感信息，应存 Secrets。但 secrets 无法通过 API 读回，
      # 而 Gradle 需要在编译时读取。
      # 折中方案：用 Repository Variables 存密码，并在 build.yml 里使用。
      # 如果你的仓库是私有仓库，这是可接受的方案。
      # 如果是公开仓库，强烈建议改用 Secrets（需要手动在 Settings 里设置）。
      - name: 📝 Update GitHub Repository Variables
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STORE_PASS: ${{ steps.keygen.outputs.store_pass }}
          KEY_PASS:   ${{ steps.keygen.outputs.key_pass }}
          KEY_ALIAS:  ${{ steps.keygen.outputs.key_alias }}
          REPO:       ${{ github.repository }}
        run: |
          set -e

          update_var() {
            local name="$1"
            local value="$2"
            # 先尝试 PATCH（更新），失败则 POST（创建）
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X PATCH \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/actions/variables/$name" \
              -d "{\"name\":\"$name\",\"value\":\"$value\"}")

            if [ "$STATUS" = "204" ]; then
              echo "✅ Updated variable: $name"
            else
              STATUS2=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/$REPO/actions/variables" \
                -d "{\"name\":\"$name\",\"value\":\"$value\"}")
              if [ "$STATUS2" = "201" ]; then
                echo "✅ Created variable: $name"
              else
                echo "⚠️  Failed to set variable $name (HTTP $STATUS2). Please set it manually in Settings → Secrets and variables → Actions → Variables"
              fi
            fi
          }

          update_var "KEYSTORE_STORE_PASSWORD" "$STORE_PASS"
          update_var "KEYSTORE_KEY_PASSWORD"   "$KEY_PASS"
          update_var "KEYSTORE_KEY_ALIAS"      "$KEY_ALIAS"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 如果自动写入失败，请手动在以下位置设置："
          echo "   Settings → Secrets and variables → Actions → Variables"
          echo "   KEYSTORE_STORE_PASSWORD = <store password>"
          echo "   KEYSTORE_KEY_PASSWORD   = <key password>"
          echo "   KEYSTORE_KEY_ALIAS      = $KEY_ALIAS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── 4. 提交 keys/release.jks 到仓库 ──────────────────────────────────
      - name: 📤 Commit keystore to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 确保 keys/ 不在 .gitignore 里
          if grep -q '^keys/' .gitignore 2>/dev/null; then
            sed -i '/^keys\//d' .gitignore
            git add .gitignore
          fi

          git add keys/release.jks

          if git diff --cached --quiet; then
            echo "ℹ️  Keystore unchanged, nothing to commit"
          else
            git commit -m "🔑 update release keystore [skip ci]"
            git push origin HEAD
            echo "✅ Keystore committed to keys/release.jks"
          fi

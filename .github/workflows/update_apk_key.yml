name: 🔑 Generate & Update Release Keystore

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: 'Key alias（默认 release）'
        required: false
        default: 'release'
      validity_years:
        description: 'Key 有效期（年，默认 100）'
        required: false
        default: '100'

jobs:
  generate-key:
    name: 🔑 Generate Keystore
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 生成随机密码 & keystore ───────────────────────────────────────────────
      - name: 🔐 Generate keystore
        id: keygen
        env:
          KEY_ALIAS:      ${{ github.event.inputs.key_alias }}
          VALIDITY_YEARS: ${{ github.event.inputs.validity_years }}
        run: |
          set -e

          STORE_PASS=$(openssl rand -base64 32 | tr -d '/+=' | head -c 32)
          KEY_PASS=$(openssl rand -base64 32 | tr -d '/+=' | head -c 32)

          mkdir -p keys

          keytool -genkeypair \
            -keystore keys/release.jks \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity $(( VALIDITY_YEARS * 365 )) \
            -storepass "$STORE_PASS" \
            -keypass  "$KEY_PASS" \
            -dname "CN=SchoolManager, OU=App, O=SchoolManager, L=CN, S=CN, C=CN" \
            -storetype JKS \
            -noprompt

          echo "✅ Keystore generated: keys/release.jks"
          keytool -list -keystore keys/release.jks -storepass "$STORE_PASS" -v | head -10

          # 屏蔽日志中的明文密码
          echo "::add-mask::$STORE_PASS"
          echo "::add-mask::$KEY_PASS"

          echo "store_pass=$STORE_PASS" >> "$GITHUB_OUTPUT"
          echo "key_pass=$KEY_PASS"     >> "$GITHUB_OUTPUT"
          echo "key_alias=$KEY_ALIAS"   >> "$GITHUB_OUTPUT"

      # ── 把密码写入 keys/keystore.properties（与 jks 一起存储在仓库里）────────
      - name: 📝 Save passwords to keys/keystore.properties
        env:
          STORE_PASS: ${{ steps.keygen.outputs.store_pass }}
          KEY_PASS:   ${{ steps.keygen.outputs.key_pass }}
          KEY_ALIAS:  ${{ steps.keygen.outputs.key_alias }}
        run: |
          set -e
          # 写入属性文件（与 jks 同目录，build.yml 直接读取，无需 Variables/Secrets）
          cat > keys/keystore.properties << EOF
          KEYSTORE_STORE_PASSWORD=${STORE_PASS}
          KEYSTORE_KEY_ALIAS=${KEY_ALIAS}
          KEYSTORE_KEY_PASSWORD=${KEY_PASS}
          EOF
          echo "✅ keys/keystore.properties written"

      # ── 确保 keys/ 不被 .gitignore 排除 ─────────────────────────────────────
      - name: 🔓 Ensure keys/ is tracked by git
        run: |
          if grep -qE '^keys/' .gitignore 2>/dev/null; then
            sed -i '/^keys\//d' .gitignore
            echo "ℹ️  Removed 'keys/' from .gitignore"
          fi

      # ── 提交 keys/release.jks + keys/keystore.properties ────────────────────
      - name: 📤 Commit keystore & properties
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add keys/release.jks keys/keystore.properties .gitignore

          if git diff --cached --quiet; then
            echo "ℹ️  Keystore unchanged — nothing to commit"
          else
            git commit -m "🔑 regenerate release keystore [skip ci]"
            git push origin HEAD
            echo "✅ keys/release.jks + keys/keystore.properties committed"
          fi

          echo ""
          echo "════════════════════════════════════════════════"
          echo "  ✅ 完成！新 keystore 与密码已同步到仓库。"
          echo "  keys/release.jks         — keystore 文件"
          echo "  keys/keystore.properties — 对应密码（build.yml 直接读取）"
          echo "  下次 push 编译的 APK 将使用此 keystore 签名。"
          echo "  ⚠️  注意：更换 keystore 后旧版 APK 无法覆盖安装，"
          echo "      用户需要卸载旧版重新安装。"
          echo "════════════════════════════════════════════════"

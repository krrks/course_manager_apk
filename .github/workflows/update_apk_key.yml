name: 🔑 Generate & Update Release Keystore

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: 'Key alias（默认 release）'
        required: false
        default: 'release'
      validity_years:
        description: 'Key 有效期（年，默认 100）'
        required: false
        default: '100'

jobs:
  generate-key:
    name: 🔑 Generate Keystore
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 生成随机密码 & keystore ───────────────────────────────────────────────
      - name: 🔐 Generate keystore
        id: keygen
        env:
          KEY_ALIAS:      ${{ github.event.inputs.key_alias }}
          VALIDITY_YEARS: ${{ github.event.inputs.validity_years }}
        run: |
          set -e

          STORE_PASS=$(openssl rand -base64 32 | tr -d '/+=' | head -c 32)
          KEY_PASS=$(openssl rand -base64 32 | tr -d '/+=' | head -c 32)

          mkdir -p keys

          keytool -genkeypair \
            -keystore keys/release.jks \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity $(( VALIDITY_YEARS * 365 )) \
            -storepass "$STORE_PASS" \
            -keypass "$KEY_PASS" \
            -dname "CN=SchoolManager, OU=App, O=SchoolManager, L=CN, S=CN, C=CN" \
            -storetype JKS \
            -noprompt

          echo "✅ Keystore generated: keys/release.jks"
          keytool -list -keystore keys/release.jks -storepass "$STORE_PASS" -v | head -10

          echo "::add-mask::$STORE_PASS"
          echo "::add-mask::$KEY_PASS"
          echo "store_pass=$STORE_PASS" >> "$GITHUB_OUTPUT"
          echo "key_pass=$KEY_PASS"     >> "$GITHUB_OUTPUT"
          echo "key_alias=$KEY_ALIAS"   >> "$GITHUB_OUTPUT"

      # ── 把密码写入 Repository Variables（build.yml 通过 vars.* 读取）──────────
      # Variables 是明文，但仓库私有时可接受。
      # 如果仓库是公开的，请手动在 Settings → Secrets 设置，然后在 build.yml 里
      # 把 vars.KEYSTORE_* 改为 secrets.KEYSTORE_*
      - name: 📝 Write passwords to Repository Variables
        env:
          GH_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          STORE_PASS: ${{ steps.keygen.outputs.store_pass }}
          KEY_PASS:   ${{ steps.keygen.outputs.key_pass }}
          KEY_ALIAS:  ${{ steps.keygen.outputs.key_alias }}
          REPO:       ${{ github.repository }}
        run: |
          set -e

          upsert_var() {
            local NAME="$1" VALUE="$2"
            # 先 PATCH（更新），失败则 POST（新建）
            CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X PATCH \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/actions/variables/$NAME" \
              -d "{\"name\":\"$NAME\",\"value\":\"$VALUE\"}")
            if [ "$CODE" = "204" ]; then
              echo "✅ Updated: $NAME"
            else
              CODE2=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/$REPO/actions/variables" \
                -d "{\"name\":\"$NAME\",\"value\":\"$VALUE\"}")
              if [ "$CODE2" = "201" ]; then
                echo "✅ Created: $NAME"
              else
                echo "⚠️  FAILED ($CODE2): $NAME — 请手动设置"
              fi
            fi
          }

          upsert_var "KEYSTORE_STORE_PASSWORD" "$STORE_PASS"
          upsert_var "KEYSTORE_KEY_PASSWORD"   "$KEY_PASS"
          upsert_var "KEYSTORE_KEY_ALIAS"      "$KEY_ALIAS"

          echo ""
          echo "════════════════════════════════════════════════"
          echo "  如写入失败，请手动到："
          echo "  Settings → Secrets and variables → Actions → Variables"
          echo "  新建/更新以下三个变量："
          echo "  KEYSTORE_STORE_PASSWORD  KEYSTORE_KEY_PASSWORD  KEYSTORE_KEY_ALIAS"
          echo "════════════════════════════════════════════════"

      # ── 提交 keys/release.jks 到仓库 ─────────────────────────────────────────
      - name: 📤 Commit keystore
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 确保 keys/ 不在 .gitignore
          if grep -q '^keys/' .gitignore 2>/dev/null; then
            sed -i '/^keys\//d' .gitignore
            git add .gitignore
          fi

          git add keys/release.jks

          if git diff --cached --quiet; then
            echo "ℹ️  Keystore unchanged"
          else
            git commit -m "🔑 regenerate release keystore [skip ci]"
            git push origin HEAD
            echo "✅ keys/release.jks committed"
          fi

          echo ""
          echo "════════════════════════════════════════════════"
          echo "  ✅ 完成！新 keystore 与密码已同步。"
          echo "  下次 push 编译的 APK 将使用此 keystore 签名。"
          echo "  ⚠️  注意：更换 keystore 后旧版 APK 无法覆盖安装，"
          echo "      用户需要卸载旧版重新安装。"
          echo "════════════════════════════════════════════════"
